services:
  - type: web
    name: wispr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Trage deinen Groq API Key im Render Dashboard ein
      - key: NVIDIA_API_KEY
        sync: false # Optional: Trage deinen NVIDIA API Key im Render Dashboard ein
      - key: NVIDIA_LLM_MODEL
        value: deepseek-ai/deepseek-v4-pro
